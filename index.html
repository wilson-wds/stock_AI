<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Stock & ETF 智能分析工具</title>
    
    <!-- PWA 相關設定與自訂 Icon -->
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="default">
    <meta name="theme-color" content="#ffffff">
    <link rel="apple-touch-icon" href="https://i.ibb.co/67Fpn06R/grok-image-38ff8969-e1d9-4592-98d6-1366fb857c2c-image-edit-0-1.jpg">
    <link rel="icon" type="image/jpeg" href="https://i.ibb.co/67Fpn06R/grok-image-38ff8969-e1d9-4592-98d6-1366fb857c2c-image-edit-0-1.jpg">

    <!-- 引入 Tailwind CSS 與 Typography 插件 -->
    <script src="https://cdn.tailwindcss.com?plugins=typography"></script>
    <!-- 引入 Marked.js 來解析 Markdown -->
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
    <!-- 引入 Lucide Icons -->
    <script src="https://unpkg.com/lucide@latest"></script>
    
    <style>
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'SF Pro Display', 'PingFang TC', 'Microsoft JhengHei', sans-serif;
            -webkit-tap-highlight-color: transparent;
        }
        
        .loader {
            border-top-color: #3b82f6;
            -webkit-animation: spinner 1.5s linear infinite;
            animation: spinner 1.5s linear infinite;
        }
        @keyframes spinner {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }
        
        .no-scrollbar::-webkit-scrollbar {
            display: none;
        }
        .no-scrollbar {
            -ms-overflow-style: none;
            scrollbar-width: none;
        }

        .prose h3 {
            color: #1e293b;
            font-size: 1.125rem;
            margin-top: 1.5em;
            margin-bottom: 0.75em;
            font-weight: 700;
            display: flex;
            align-items: center;
        }
        .prose h3::before {
            content: '';
            display: inline-block;
            width: 4px;
            height: 16px;
            background-color: #3b82f6;
            margin-right: 8px;
            border-radius: 2px;
        }
        .prose p {
            color: #475569;
            font-size: 0.9375rem;
            line-height: 1.6;
        }
        .prose ul {
            padding-left: 1.25em;
        }
        .prose li {
            color: #475569;
            font-size: 0.9375rem;
            margin-bottom: 0.5em;
            line-height: 1.6;
        }
        
        .prose table {
            width: 100%;
            display: block;
            overflow-x: auto;
            white-space: nowrap;
            -webkit-overflow-scrolling: touch;
            border-collapse: collapse;
            font-size: 0.875rem;
            margin-bottom: 1.5rem;
        }
        .prose th, .prose td {
            border: 1px solid #e2e8f0;
            padding: 8px 12px;
            text-align: left;
        }
        .prose th {
            background-color: #f1f5f9;
            font-weight: 600;
            color: #334155;
        }

        .modal-overlay {
            background-color: rgba(0, 0, 0, 0.5);
            backdrop-filter: blur(4px);
        }
    </style>
</head>
<body class="bg-slate-50 h-[100dvh] flex flex-col text-slate-800 overflow-hidden relative">

    <div id="apiKeyModal" class="hidden fixed inset-0 z-50 modal-overlay flex items-center justify-center p-4 opacity-0 transition-opacity duration-300">
        <div class="bg-white rounded-3xl shadow-xl w-full max-w-sm p-6 transform scale-95 transition-transform duration-300" id="apiKeyModalContent">
            <div class="flex flex-col items-center mb-5">
                <div class="bg-blue-100 p-3 rounded-full mb-3">
                    <i data-lucide="key" class="w-8 h-8 text-blue-600"></i>
                </div>
                <h3 class="text-xl font-bold text-slate-900">歡迎使用 Stock AI</h3>
                <p class="text-sm text-slate-500 text-center mt-2">為了啟用智能分析功能，<br>請輸入您的專屬 Gemini API Key。</p>
            </div>
            
            <div class="space-y-4">
                <div>
                    <label for="apiKeyInput" class="block text-xs font-medium text-slate-700 mb-1">Google Gemini API Key</label>
                    <input type="password" id="apiKeyInput" placeholder="輸入您的 API Key (AQ. 或 AIza 開頭)" 
                        class="w-full px-4 py-3 bg-slate-50 border border-slate-200 rounded-xl focus:outline-none focus:ring-2 focus:ring-blue-500 transition-colors text-sm font-mono">
                    <p class="text-[10px] text-slate-400 mt-1.5 leading-tight">這把鑰匙將僅安全地儲存於您的手機本地，不會上傳至任何伺服器。</p>
                </div>
                <button id="saveApiKeyBtn" class="w-full bg-blue-600 hover:bg-blue-700 text-white font-medium py-3 rounded-xl transition-colors shadow-sm active:scale-95">
                    儲存並開始使用
                </button>
            </div>
            
            <button id="closeModalBtn" class="absolute top-4 right-4 text-slate-400 hover:text-slate-600 hidden">
                <i data-lucide="x" class="w-5 h-5"></i>
            </button>
        </div>
    </div>

    <header class="bg-white/80 backdrop-blur-md shadow-sm z-20 shrink-0 pt-[env(safe-area-inset-top)]">
        <div class="px-4 py-3.5 flex items-center justify-between border-b border-slate-100">
            <div class="flex items-center space-x-2.5">
                <img src="https://i.ibb.co/67Fpn06R/grok-image-38ff8969-e1d9-4592-98d6-1366fb857c2c-image-edit-0-1.jpg" alt="Logo" class="w-8 h-8 rounded-lg shadow-sm object-cover">
                <div>
                    <h1 class="text-base font-bold text-slate-900 leading-tight">Stock AI 分析</h1>
                    <p class="text-[10px] text-slate-500 font-medium leading-none mt-0.5">Will Design Studio</p>
                </div>
            </div>
            <div class="flex items-center gap-2">
                <button onclick="openApiKeyModal()" class="text-slate-400 hover:text-blue-600 bg-slate-100 p-2 rounded-full transition-colors active:scale-95" title="設定 API Key">
                    <i data-lucide="settings" class="w-5 h-5"></i>
                </button>
                <button onclick="copyReport()" id="copyBtn" class="hidden text-slate-400 hover:text-blue-600 bg-slate-100 p-2 rounded-full transition-colors active:scale-95" title="複製報告">
                    <i data-lucide="copy" class="w-5 h-5"></i>
                </button>
            </div>
        </div>
    </header>

    <main class="flex-grow overflow-y-auto no-scrollbar pb-[100px] px-4 pt-6" id="mainContent">
        
        <div id="welcomeScreen" class="flex flex-col items-center justify-center text-center mt-10 mb-8 px-2">
            <img src="https://i.ibb.co/67Fpn06R/grok-image-38ff8969-e1d9-4592-98d6-1366fb857c2c-image-edit-0-1.jpg" alt="Robot AI" class="w-20 h-20 rounded-2xl shadow-md mb-4 object-cover">
            <h2 class="text-xl font-bold text-slate-800 mb-2">專屬智能分析助理</h2>
            <p class="text-sm text-slate-500">輸入台股或美股代號，我將為您彙整最新新聞、近期重要行程、與市場分析。</p>
        </div>

        <div id="errorMessage" class="hidden bg-red-50 border border-red-200 text-red-700 px-4 py-3 rounded-xl flex items-start gap-3 mb-4 shadow-sm">
            <i data-lucide="alert-circle" class="w-5 h-5 mt-0.5 flex-shrink-0"></i>
            <span id="errorText" class="text-sm break-all">發生錯誤，請稍後再試。</span>
        </div>

        <div id="loadingState" class="hidden flex-col items-center justify-center py-10 space-y-4">
            <div class="loader ease-linear rounded-full border-4 border-slate-200 h-10 w-10"></div>
            <p class="text-slate-500 text-sm font-medium animate-pulse text-center">
                正在彙整最新市場資訊...<br>
                <span class="text-xs text-slate-400 font-normal">這可能需要大約 10-15 秒，請稍候</span>
            </p>
        </div>

        <div id="resultContainer" class="hidden bg-white rounded-2xl shadow-sm border border-slate-100 p-5 opacity-0 transition-opacity duration-500 mb-6">
            <div class="flex items-center gap-3 mb-4 pb-3 border-b border-slate-100">
                <div class="bg-blue-50 text-blue-600 text-xs font-bold px-2 py-1 rounded">代號</div>
                <h2 class="text-xl font-bold text-slate-900 tracking-wider" id="displayTicker"></h2>
            </div>

            <div id="reportContent" class="prose prose-slate max-w-none w-full">
                <!-- 內容將動態插入此處 -->
            </div>
            
            <div id="sourcesContainer" class="hidden mt-6 pt-4 border-t border-slate-100">
                <h3 class="text-xs font-semibold text-slate-500 mb-2 uppercase tracking-wider flex items-center gap-1.5">
                    <i data-lucide="link" class="w-3 h-3"></i> 搜尋關鍵字紀錄
                </h3>
                <ul id="sourcesList" class="text-[13px] text-slate-500 space-y-1.5 list-none">
                    <!-- 來源將動態插入 -->
                </ul>
            </div>
        </div>
    </main>

    <div class="bg-white/90 backdrop-blur-md border-t border-slate-200 absolute bottom-0 left-0 w-full z-20 pb-[env(safe-area-inset-bottom)] px-4 py-3 shadow-[0_-4px_20px_rgba(0,0,0,0.05)]">
        <form id="searchForm" class="flex items-center gap-2 max-w-4xl mx-auto">
            <div class="relative flex-grow">
                <div class="absolute inset-y-0 left-0 pl-3.5 flex items-center pointer-events-none">
                    <i data-lucide="search" class="text-slate-400 w-5 h-5"></i>
                </div>
                <input type="text" id="tickerInput" required placeholder="輸入股號 (如: 2330, NVDA)" 
                    class="w-full pl-10 pr-4 py-3 bg-slate-100 border-none rounded-2xl focus:outline-none focus:ring-2 focus:ring-blue-500 transition-all text-base uppercase font-medium placeholder:font-normal">
            </div>
            <button type="submit" id="submitBtn" 
                class="bg-blue-600 hover:bg-blue-700 text-white p-3 rounded-2xl transition-transform active:scale-90 flex-shrink-0 shadow-sm disabled:opacity-50 disabled:active:scale-100">
                <i data-lucide="send" class="w-6 h-6 ml-0.5"></i>
            </button>
        </form>
    </div>

    <script>
        lucide.createIcons();

        let currentApiKey = localStorage.getItem('gemini_api_key') || "";

        // 使用支援工具呼叫且速度較快的模型
        const getModelUrl = () => `https://generativelanguage.googleapis.com/v1beta/models/gemini-2.5-flash:generateContent?key=${currentApiKey}`;

        const apiKeyModal = document.getElementById('apiKeyModal');
        const apiKeyModalContent = document.getElementById('apiKeyModalContent');
        const apiKeyInput = document.getElementById('apiKeyInput');
        const saveApiKeyBtn = document.getElementById('saveApiKeyBtn');
        const closeModalBtn = document.getElementById('closeModalBtn');
        
        const searchForm = document.getElementById('searchForm');
        const tickerInput = document.getElementById('tickerInput');
        const submitBtn = document.getElementById('submitBtn');
        const loadingState = document.getElementById('loadingState');
        const resultContainer = document.getElementById('resultContainer');
        const reportContent = document.getElementById('reportContent');
        const displayTicker = document.getElementById('displayTicker');
        const errorMessage = document.getElementById('errorMessage');
        const errorText = document.getElementById('errorText');
        const sourcesContainer = document.getElementById('sourcesContainer');
        const sourcesList = document.getElementById('sourcesList');
        const mainContent = document.getElementById('mainContent');
        const welcomeScreen = document.getElementById('welcomeScreen');
        const copyBtn = document.getElementById('copyBtn');

        function checkApiKey() {
            if (!currentApiKey) openApiKeyModal();
        }

        function openApiKeyModal() {
            apiKeyInput.value = currentApiKey;
            apiKeyModal.classList.remove('hidden');
            if(currentApiKey) closeModalBtn.classList.remove('hidden');
            else closeModalBtn.classList.add('hidden');
            
            setTimeout(() => {
                apiKeyModal.classList.remove('opacity-0');
                apiKeyModalContent.classList.remove('scale-95');
                apiKeyModalContent.classList.add('scale-100');
            }, 10);
        }

        function closeApiKeyModal() {
            if (!currentApiKey) return alert("必須輸入 API Key 才能使用服務！");
            apiKeyModal.classList.add('opacity-0');
            apiKeyModalContent.classList.remove('scale-100');
            apiKeyModalContent.classList.add('scale-95');
            setTimeout(() => apiKeyModal.classList.add('hidden'), 300);
        }

        saveApiKeyBtn.addEventListener('click', () => {
            const newKey = apiKeyInput.value.trim();
            if (newKey) {
                currentApiKey = newKey;
                localStorage.setItem('gemini_api_key', currentApiKey);
                closeApiKeyModal();
            } else alert("請輸入有效的 API Key");
        });

        closeModalBtn.addEventListener('click', closeApiKeyModal);
        window.addEventListener('DOMContentLoaded', checkApiKey);

        async function fetchWithRetry(url, options, retries = 2) {
            for (let i = 0; i < retries; i++) {
                try {
                    const response = await fetch(url, options);
                    const data = await response.json();
                    
                    if (!response.ok) {
                        const errorMsg = data.error?.message || `狀態碼: ${response.status}`;
                        throw new Error(errorMsg);
                    }
                    return data;
                } catch (error) {
                    if (i === retries - 1) throw error;
                    console.log(`連線失敗，重試中...`);
                    await new Promise(resolve => setTimeout(resolve, 2000));
                }
            }
        }

        searchForm.addEventListener('submit', async (e) => {
            e.preventDefault();
            
            if (!currentApiKey) return openApiKeyModal();

            const ticker = tickerInput.value.trim().toUpperCase();
            if (!ticker) return;

            tickerInput.blur();
            hideError();
            showLoading();
            welcomeScreen.classList.add('hidden');
            resultContainer.classList.add('hidden');
            resultContainer.classList.remove('opacity-100');
            sourcesContainer.classList.add('hidden');
            sourcesList.innerHTML = '';
            copyBtn.classList.add('hidden');

            try {
                // 優化提示詞：明確要求完整輸出，並且不允許中斷
                const systemPrompt = "你是一位專業、不被中斷的證券分析師。請務必利用 Google Search 獲取最新資訊。請你深呼吸，慢慢思考，『完整且詳細』地輸出以下所有要求的內容，絕不可省略或中斷。請使用繁體中文與 Markdown 格式。";
                
                const userQuery = `請針對股票代號「${ticker}」，完整回答以下所有項目。每個項目都必須有內容：

### 1. 近五日價格走勢
(請畫出完整的 5 列 Markdown 表格，包含最近 5 個交易日的：日期、收盤價、漲跌金額、漲跌幅、是否漲停或跌停)

### 2. 最新近況與新聞
(請詳細說明該公司最近一週的重大新聞、財報表現或產業動態，至少寫 3 點)

### 3. 近期重要行程
(請列出近期是否即將舉辦或剛結束法說會、除權息日、財報公佈日等，沒有則清楚寫明無重大行程)

### 4. 影響漲跌關鍵因素
(請分析市場上目前的看多理由與看空理由，包含籌碼面或消息面)

### 5. 短期走勢預期總結
(基於上述資訊，給出一段關於該股短線市場心理的客觀總結)`;

                const payload = {
                    contents: [{ role: "user", parts: [{ text: userQuery }] }],
                    systemInstruction: { role: "system", parts: [{ text: systemPrompt }] },
                    tools: [{ googleSearch: {} }],
                    // 重要設定：調降安全過濾與增加輸出長度
                    safetySettings: [
                        { category: "HARM_CATEGORY_HARASSMENT", threshold: "BLOCK_NONE" },
                        { category: "HARM_CATEGORY_HATE_SPEECH", threshold: "BLOCK_NONE" },
                        { category: "HARM_CATEGORY_SEXUALLY_EXPLICIT", threshold: "BLOCK_NONE" },
                        { category: "HARM_CATEGORY_DANGEROUS_CONTENT", threshold: "BLOCK_NONE" }
                    ],
                    generationConfig: {
                        temperature: 0.2,
                        maxOutputTokens: 8192 // 開到最大，防止被截斷
                    }
                };

                const data = await fetchWithRetry(getModelUrl(), {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(payload)
                });

                if (data.candidates && data.candidates.length > 0) {
                    const candidate = data.candidates[0];
                    
                    if (candidate.finishReason === 'SAFETY' || candidate.finishReason === 'MAX_TOKENS') {
                        throw new Error(`內容生成被中斷 (原因: ${candidate.finishReason})，請重新嘗試。`);
                    }

                    const text = candidate.content?.parts?.[0]?.text || "無內容。";
                    
                    const groundingMetadata = candidate.groundingMetadata || {};
                    const webSearchQueries = groundingMetadata.webSearchQueries || [];
                    
                    displayTicker.textContent = ticker;
                    reportContent.innerHTML = marked.parse(text); 
                    
                    if (webSearchQueries.length > 0) {
                         sourcesContainer.classList.remove('hidden');
                         const queriesHtml = webSearchQueries.map(q => `<li class="flex items-start gap-1.5"><i data-lucide="search" class="w-3.5 h-3.5 mt-0.5 text-slate-400"></i><span>${q}</span></li>`).join('');
                         sourcesList.innerHTML = queriesHtml;
                         lucide.createIcons();
                    }

                    showResult();
                } else {
                    console.log("Response:", data);
                    throw new Error("伺服器回傳空白內容。");
                }

            } catch (error) {
                console.error("Error:", error);
                let errorMsg = `分析失敗：${error.message}`;
                if (error.message.includes("API_KEY_INVALID")) {
                    errorMsg = "API Key 無效，請點擊右上角重新設定。";
                }
                showError(errorMsg);
                welcomeScreen.classList.remove('hidden');
            } finally {
                hideLoading();
            }
        });

        function copyReport() {
            const tempDiv = document.createElement('div');
            tempDiv.innerHTML = reportContent.innerHTML;
            const plainText = tempDiv.innerText;
            
            const textArea = document.createElement("textarea");
            textArea.value = `【${displayTicker.textContent} 智能分析報告】\n\n` + plainText;
            document.body.appendChild(textArea);
            textArea.select();
            try {
                document.execCommand('copy');
                const originalHTML = copyBtn.innerHTML;
                copyBtn.innerHTML = `<i data-lucide="check" class="w-5 h-5 text-green-500"></i>`;
                lucide.createIcons();
                setTimeout(() => {
                    copyBtn.innerHTML = originalHTML;
                    lucide.createIcons();
                }, 2000);
            } catch (err) {}
            document.body.removeChild(textArea);
        }

        function showLoading() {
            submitBtn.disabled = true;
            loadingState.classList.remove('hidden');
            loadingState.classList.add('flex');
            mainContent.scrollTop = 0;
        }

        function hideLoading() {
            submitBtn.disabled = false;
            loadingState.classList.add('hidden');
            loadingState.classList.remove('flex');
        }

        function showResult() {
            resultContainer.classList.remove('hidden');
            copyBtn.classList.remove('hidden');
            setTimeout(() => resultContainer.classList.add('opacity-100'), 50);
        }

        function showError(msg) {
            errorText.textContent = msg;
            errorMessage.classList.remove('hidden');
        }

        function hideError() {
            errorMessage.classList.add('hidden');
        }
    </script>
</body>
</html>
